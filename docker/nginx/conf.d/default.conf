# --- Movabi Frontend (App & Admin) ---
server {
    listen 80;
    server_name movabi.apps.evolsolution.com;

    location / {
        proxy_pass http://movabi-admin:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# --- Supabase API (Kong) ---
server {
    listen 80;
    server_name movabi-supabase.apps.evolsolution.com;

    location / {
        proxy_pass http://movabi-supabase-kong:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support for Realtime
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# --- Movabi Node API ---
server {
    listen 80;
    server_name movabi-api.apps.evolsolution.com;

    location / {
        proxy_pass http://movabi-api:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
