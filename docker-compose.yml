version: "3.8"

services:
  movabi-supabase-db:
    image: supabase/postgres:15.1.1.78
    container_name: movabi-supabase-db
    restart: unless-stopped
    env_file:
      - /srv/movabi/shared/.env
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
    volumes:
      - movabi-supabase-db-data:/var/lib/postgresql/data
      - ./supabase/migrations:/docker-entrypoint-initdb.d/migrations:ro
    networks:
      - movabi-private

  movabi-supabase-auth:
    image: supabase/gotrue:v2.132.3
    container_name: movabi-supabase-auth
    restart: unless-stopped
    env_file:
      - /srv/movabi/shared/.env
    depends_on:
      - movabi-supabase-db
    environment:
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://postgres:MovabiDB%402026Secure%21@movabi-supabase-db:5432/postgres?sslmode=disable
      GOTRUE_JWT_SECRET: ${JWT_SECRET}
      GOTRUE_SITE_URL: ${APP_URL}
      GOTRUE_JWT_EXP: 3600
      GOTRUE_EXTERNAL_GOOGLE_ENABLED: "true"
      GOTRUE_EXTERNAL_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOTRUE_EXTERNAL_GOOGLE_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOTRUE_EXTERNAL_GOOGLE_REDIRECT_URI: ${SUPABASE_URL}/auth/v1/callback
      GOTRUE_API_EXTERNAL_URL: ${SUPABASE_URL}/auth/v1
      GOTRUE_MAILER_URLPATHS_CONFIRMATION: /auth/v1/verify
      GOTRUE_MAILER_URLPATHS_INVITE: /auth/v1/invite
      GOTRUE_MAILER_URLPATHS_RECOVERY: /auth/v1/verify
      GOTRUE_MAILER_URLPATHS_EMAIL_CHANGE: /auth/v1/verify
      GOTRUE_SMTP_ADMIN_EMAIL: ${SMTP_ADMIN_EMAIL}
      GOTRUE_SMTP_HOST: ${SMTP_HOST}
      GOTRUE_SMTP_PORT: ${SMTP_PORT}
      GOTRUE_SMTP_USER: ${SMTP_USER}
      GOTRUE_SMTP_PASS: ${SMTP_PASS}
      GOTRUE_SMTP_SENDER_NAME: ${SMTP_SENDER_NAME}
      GOTRUE_MAILER_AUTOCONFIRM: "false"
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_EXTERNAL_REDIRECT_URLS: http://localhost:3000/**,https://movabi.apps.evolsolution.com/**,capacitor://localhost/**
    dns:
      - 1.1.1.1
      - 8.8.8.8
    networks:
      - movabi-private

  movabi-supabase-rest:
    image: postgrest/postgrest:v10.1.2
    container_name: movabi-supabase-rest
    restart: unless-stopped
    env_file:
      - /srv/movabi/shared/.env
    depends_on:
      - movabi-supabase-db
    environment:
      PGRST_DB_URI: postgres://postgres:${POSTGRES_PASSWORD_ENCODED}@movabi-supabase-db:5432/postgres?sslmode=disable
      PGRST_DB_SCHEMA: public,storage,graphql_public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET}
      PGRST_DB_USE_STATS: "true"
    networks:
      - movabi-private

  movabi-supabase-realtime:
    image: supabase/realtime:latest
    container_name: movabi-supabase-realtime
    restart: unless-stopped
    env_file:
      - /srv/movabi/shared/.env
    depends_on:
      - movabi-supabase-db
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "code=$$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:4000/api/tenants/realtime-dev/health || true); [ \"$$code\" = \"200\" ] || [ \"$$code\" = \"403\" ]"
        ]
      timeout: 10s
      interval: 30s
      retries: 5
      start_period: 30s
    environment:
      PORT: 4000
      DB_HOST: movabi-supabase-db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: postgres
      DB_AFTER_CONNECT_QUERY: SET search_path TO _realtime,public
      DB_ENC_KEY: ${DB_ENC_KEY}
      API_JWT_SECRET: ${API_JWT_SECRET}
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      METRICS_JWT_SECRET: ${METRICS_JWT_SECRET}
      APP_NAME: ${APP_NAME}
      API_EXTERNAL_URL: ${API_EXTERNAL_URL}
      ERL_AFLAGS: -proto_dist inet_tcp
      DNS_NODES: "''"
      RLIMIT_NOFILE: "10000"
      SEED_SELF_HOST: "true"
      RUN_JANITOR: "true"
      DISABLE_HEALTHCHECK_LOGGING: "true"
    networks:
      - movabi-private

  movabi-supabase-kong:
    image: kong:2.8.1
    container_name: movabi-supabase-kong
    restart: unless-stopped
    env_file:
      - /srv/movabi/shared/.env
    depends_on:
      - movabi-supabase-auth
      - movabi-supabase-rest
      - movabi-supabase-realtime
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /var/lib/kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
      VIRTUAL_HOST: ${MOVABI_SUPABASE_DOMAIN}
      VIRTUAL_PORT: 8000
      LETSENCRYPT_HOST: ${MOVABI_SUPABASE_DOMAIN}
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL}
    expose:
      - "8000"
    volumes:
      - ./docker/supabase/kong.yml:/var/lib/kong/kong.yml:ro
    networks:
      - movabi-private
      - nginx-proxy

  movabi-api:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: movabi-api
    restart: unless-stopped
    env_file:
      - /srv/movabi/shared/.env
    depends_on:
      - movabi-supabase-kong
    environment:
      PORT: 3001
      NODE_ENV: production
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      SUPABASE_URL: http://movabi-supabase-kong:8000
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      APP_URL: ${APP_URL}
      API_URL: ${API_URL}
      VIRTUAL_HOST: ${MOVABI_API_DOMAIN}
      VIRTUAL_PORT: 3001
      LETSENCRYPT_HOST: ${MOVABI_API_DOMAIN}
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL}
    expose:
      - "3001"
    networks:
      - movabi-private
      - nginx-proxy

  movabi-admin:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
      args:
        PROJECT_NAME: admin
    container_name: movabi-admin
    restart: unless-stopped
    env_file:
      - /srv/movabi/shared/.env
    environment:
      VIRTUAL_HOST: ${MOVABI_ADMIN_DOMAIN}
      VIRTUAL_PORT: 80
      LETSENCRYPT_HOST: ${MOVABI_ADMIN_DOMAIN}
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL}
    expose:
      - "80"
    networks:
      - movabi-private
      - nginx-proxy

networks:
  movabi-private:
    name: movabi-private
    driver: bridge
    ipam:
      config:
        - subnet: 172.25.0.0/16
          gateway: 172.25.0.1
  nginx-proxy:
    external: true
    name: web

volumes:
  movabi-supabase-db-data:
    name: movabi-supabase-db-data